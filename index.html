<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한자 훈음 게임</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;font-family:Arial,'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#fff3bd,#eaf5ff);color:#12336b}
.app{width:min(980px,100%);background:white;border:4px solid #123b85;border-radius:28px;padding:24px;box-shadow:0 18px 40px rgba(0,0,0,.14)}
h1{margin:0 0 12px;text-align:center;font-size:clamp(30px,5vw,56px)}
.modebar,.top{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.pill{background:#123b85;color:white;border-radius:999px;padding:10px 18px;font-weight:900;font-size:18px}
.mode{background:#e8f1ff;color:#123b85;border:3px solid #123b85;border-radius:18px;padding:12px 16px;font-size:18px;font-weight:900;cursor:pointer}
.mode.on{background:#123b85;color:white}
.quiz{text-align:center;background:#fff3aa;border:3px dashed #f0a400;border-radius:24px;padding:20px;margin-bottom:18px}
.label{font-weight:900;font-size:20px}
.questionText{font-size:clamp(42px,8vw,86px);font-weight:900;color:#df4d28;margin:8px 0}
.hanjaBig{font-size:clamp(90px,18vw,180px);color:#111;line-height:1}
button{border:none;cursor:pointer;font-weight:900}
.controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.ctrl{background:#123b85;color:white;border-radius:16px;padding:13px 18px;font-size:18px}
.ctrl.green{background:#238443}.ctrl.gray{background:#777}
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.choice{aspect-ratio:1.25/1;border:4px solid #123b85;border-radius:24px;background:#fff;font-size:clamp(58px,12vw,120px);color:#111;box-shadow:0 7px 0 #bfd0ee;transition:.08s}
.choice.readingChoice{font-size:clamp(24px,5vw,46px);color:#12336b}
.choice:hover{transform:translateY(-3px);background:#eef6ff}
.choice.correct{background:#caffd1;border-color:#21a642}
.choice.wrong{background:#ffd4d4;border-color:#e23b3b}
.writeBox{display:none;gap:10px;justify-content:center;align-items:center;margin-top:18px;flex-wrap:wrap}
input{width:min(480px,90%);padding:18px;border:4px solid #123b85;border-radius:18px;font-size:34px;text-align:center;font-weight:900}
.msg{min-height:38px;text-align:center;font-size:25px;font-weight:900;margin-top:16px}
.small{text-align:center;color:#607088;font-weight:700;margin-top:10px}
@media(max-width:700px){.choices{grid-template-columns:repeat(2,1fr)}.app{padding:16px}}
</style>
</head>
<body>
<div class="app">
<h1>⭐ 한자 훈음 게임</h1>

<div class="modebar">
<button id="modeListen" class="mode on" onclick="setMode('listen')">① 훈음 듣고 한자 고르기</button>
<button id="modeRead" class="mode" onclick="setMode('read')">② 한자 보고 훈음 고르기</button>
<button id="modeWrite" class="mode" onclick="setMode('write')">③ 한자 보고 훈음 쓰기</button>
</div>

<div class="top">
<div class="pill">점수 <span id="score">0</span></div>
<div class="pill">문제 <span id="qnum">1</span> / 40</div>
</div>

<section class="quiz">
<div id="label" class="label">이 훈음에 맞는 한자를 클릭!</div>
<div id="questionText" class="questionText">노래 가</div>
<div class="controls">
<button id="soundBtn" class="ctrl green" onclick="speakCurrent()">🔊 듣기</button>
<button class="ctrl" onclick="nextQuestion()">➡️ 다음</button>
<button class="ctrl gray" onclick="restart()">처음부터</button>
</div>
</section>

<div class="choices" id="choices"></div>

<div class="writeBox" id="writeBox">
<input id="answerInput" placeholder="예: 노래 가" onkeydown="if(event.key==='Enter') checkWritten()">
<button class="ctrl green" onclick="checkWritten()">정답 확인</button>
</div>

<div class="msg" id="msg"></div>
<div class="small">모드 버튼을 눌러 게임 방식을 바꿀 수 있어요.</div>
</div>

<script>
const DATA = [["歌", "노래 가"], ["家", "집 가"], ["間", "사이 간"], ["車", "수레 거"], ["巾", "수건 건"], ["古", "예 고"], ["空", "빌 공"], ["教", "가르칠 교"], ["校", "학교 교"], ["國", "나라 국"], ["軍", "군사 군"], ["今", "이제 금"], ["記", "기록할 기"], ["氣", "기운 기"], ["己", "몸 기"], ["農", "농사 농"], ["答", "대답 답"], ["代", "대신할 대"], ["大", "큰 대"], ["道", "길 도"], ["洞", "골 동"], ["登", "올 등"], ["來", "올 래"], ["老", "늙을 로"], ["里", "마을 리"], ["林", "수풀 림"], ["馬", "말 마"], ["萬", "일만 만"], ["末", "끝 말"], ["每", "매양 매"], ["面", "낯 면"], ["問", "물을 문"], ["物", "물건 물"], ["民", "백성 민"], ["本", "근본 본"], ["不", "아니 불"], ["分", "나눌 분"], ["士", "선비 사"], ["事", "일 사"], ["色", "빛 색"]];
let pool=[], current=null, score=0, qnum=1, locked=false, mode='listen';

function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function normalize(s){return (s||'').replace(/\s+/g,'').trim();}

function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=.78; u.pitch=1.05;
  speechSynthesis.speak(u);
}
function speakCurrent(){if(current) speak(current[1]);}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.remove('on'));
  document.getElementById(m==='listen'?'modeListen':m==='read'?'modeRead':'modeWrite').classList.add('on');
  restart();
}

function makeChoices(){
  const wrongs=shuffle(DATA.filter(x=>x[0]!==current[0])).slice(0,5);
  return shuffle([current,...wrongs]);
}

function renderQuestion(){
  locked=false;
  document.getElementById('qnum').textContent=qnum;
  document.getElementById('msg').textContent='';
  document.getElementById('choices').innerHTML='';
  document.getElementById('writeBox').style.display='none';
  document.getElementById('soundBtn').style.display=mode==='listen'?'inline-block':'none';

  if(mode==='listen'){
    document.getElementById('label').textContent='이 훈음에 맞는 한자를 클릭!';
    document.getElementById('questionText').className='questionText';
    document.getElementById('questionText').textContent=current[1];
    makeChoices().forEach(item=>addChoice(item[0],item,false));
    setTimeout(speakCurrent,300);
  } else if(mode==='read'){
    document.getElementById('label').textContent='이 한자의 훈음을 클릭!';
    document.getElementById('questionText').className='questionText hanjaBig';
    document.getElementById('questionText').textContent=current[0];
    makeChoices().forEach(item=>addChoice(item[1],item,true));
  } else {
    document.getElementById('label').textContent='이 한자의 훈음을 직접 쓰세요!';
    document.getElementById('questionText').className='questionText hanjaBig';
    document.getElementById('questionText').textContent=current[0];
    document.getElementById('writeBox').style.display='flex';
    const inp=document.getElementById('answerInput');
    inp.value='';
    setTimeout(()=>inp.focus(),100);
  }
}

function addChoice(text,item,isReading){
  const b=document.createElement('button');
  b.className='choice'+(isReading?' readingChoice':'');
  b.textContent=text;
  b.onclick=()=>checkChoice(b,item);
  document.getElementById('choices').appendChild(b);
}

function markCorrect(){
  locked=true;
  score+=10;
  document.getElementById('score').textContent=score;
  document.getElementById('msg').textContent='정답! '+current[0]+' = '+current[1];
  setTimeout(nextQuestion,900);
}

function checkChoice(btn,item){
  if(locked) return;
  if(item[0]===current[0]){btn.classList.add('correct');markCorrect();}
  else{btn.classList.add('wrong');document.getElementById('msg').textContent='다시 찾아보세요!';}
}

function checkWritten(){
  if(locked) return;
  const ans=normalize(document.getElementById('answerInput').value);
  const right=normalize(current[1]);
  if(ans===right) markCorrect();
  else document.getElementById('msg').textContent='아쉬워요! 정답은 "'+current[1]+'"';
}

function nextQuestion(){
  if(pool.length===0){
    current=null;
    document.getElementById('questionText').className='questionText';
    document.getElementById('questionText').textContent='게임 완료!';
    document.getElementById('choices').innerHTML='';
    document.getElementById('writeBox').style.display='none';
    document.getElementById('msg').textContent='🎉 최종 점수: '+score+'점';
    return;
  }
  current=pool.shift();
  renderQuestion();
  qnum++;
}

function restart(){
  pool=shuffle(DATA);
  score=0;qnum=1;
  document.getElementById('score').textContent=score;
  nextQuestion();
}
restart();
</script>
</body>
</html>
