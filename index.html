<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4학년 Spelling Bee</title>
<style>
:root{--y:#ffd84d;--b:#4aa8ff;--g:#39c98a;--r:#ff6577;--ink:#263247;--muted:#6c7585}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,"Pretendard",sans-serif;color:var(--ink);
background:linear-gradient(135deg,#fff9dc,#eaf6ff);min-height:100vh}
.app{max-width:1050px;margin:auto;padding:22px}.head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.logo{font-size:46px}.head h1{margin:0;font-size:34px}.head p{margin:4px 0 0;color:var(--muted);font-weight:700}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.tab{border:0;border-radius:16px;padding:15px 10px;background:#fff;font-weight:900;color:var(--muted);box-shadow:0 6px 18px #0001}
.tab.active{background:var(--ink);color:#fff}
.layout{display:grid;grid-template-columns:1.5fr .7fr;gap:16px}
.card{background:#fff;border-radius:26px;box-shadow:0 16px 45px #0002}
.main{min-height:560px;padding:28px;display:flex;flex-direction:column}.side{padding:22px;height:max-content}
.top{display:flex;justify-content:space-between;font-weight:900;color:var(--muted)}.meter{height:10px;background:#edf0f4;border-radius:99px;margin:14px 0;overflow:hidden}
.meter div{height:100%;width:0;background:linear-gradient(90deg,var(--y),var(--g));transition:.3s}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px}
.bee{font-size:74px}.prompt{font-size:25px;font-weight:950}.word{font-size:clamp(40px,8vw,76px);font-weight:1000;letter-spacing:.04em}
.spelling{font-size:clamp(24px,5vw,43px);font-weight:1000;color:var(--b);letter-spacing:.12em}.count{font-size:120px;font-weight:1000;color:var(--r)}
.answer{width:min(500px,100%);padding:17px;border:3px solid #dfe5ed;border-radius:17px;text-align:center;font-size:28px;font-weight:900;outline:none}
.answer:focus{border-color:var(--b)}.result{min-height:32px;font-size:21px;font-weight:950}.hint{color:var(--muted);font-weight:700}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.player{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;padding:12px 14px;background:#f7f9fc;border-radius:18px}.player .btn{min-width:52px}.btn{border:0;border-radius:15px;padding:13px 18px;font-weight:950;cursor:pointer}
.primary{background:var(--y)}.blue{background:var(--b);color:#fff}.green{background:var(--g);color:#fff}.ghost{background:#f1f3f6}.red{background:var(--r);color:#fff}
label{display:block;font-size:13px;font-weight:900;color:var(--muted);margin:14px 0 7px}select,input[type=number]{width:100%;padding:11px;border:1px solid #ddd;border-radius:12px;font-weight:800}
.check{display:flex;gap:8px;align-items:center;margin-top:14px;font-weight:800}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}
.stat{background:#f6f7f9;border-radius:15px;padding:13px;text-align:center}.stat b{font-size:25px;display:block}.hidden{display:none!important}
@media(max-width:800px){.layout{grid-template-columns:1fr}.side{order:-1}.tabs{grid-template-columns:1fr}.main{min-height:500px}.head h1{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <div class="head"><div class="logo">🐝</div><div><h1>4학년 Spelling Bee</h1><p>50·100·200단어 자동 연속 재생 · 일시정지 · 이전/다음 · 반복</p></div></div>
  <div class="tabs">
    <button class="tab active" data-mode="listenSpell">① 단어 + 스펠링 듣기</button>
    <button class="tab" data-mode="delayReveal">② 6초 뒤 정답 보기</button>
    <button class="tab" data-mode="typing">③ 정답 타이핑</button>
  </div>

  <div class="layout">
    <section class="card main">
      <div class="top"><span id="level">BASIC WORD</span><span id="progress">1 / 20</span></div>
      <div class="meter"><div id="bar"></div></div>
      <div class="stage">
        <div class="bee">🐝</div>
        <div id="prompt" class="prompt"></div>
        <div id="count" class="count hidden">6</div>
        <div id="word" class="word"></div>
        <div id="spelling" class="spelling hidden"></div>
        <input id="answer" class="answer hidden" autocomplete="off" spellcheck="false" placeholder="정답을 입력하세요">
        <div id="result" class="result"></div>
        <div id="hint" class="hint"></div>
        <div class="player">
          <button id="prev" class="btn ghost" title="이전 단어">⏮</button>
          <button id="playPause" class="btn primary" title="재생/일시정지">▶️ 재생</button>
          <button id="nextPlayer" class="btn ghost" title="다음 단어">⏭</button>
          <button id="repeatOne" class="btn ghost" title="현재 단어 반복">🔁 반복</button>
        </div>
        <div class="controls">
          <button id="listen" class="btn primary">🔊 다시 듣기</button>
          <button id="spellBtn" class="btn blue">🔤 스펠링 듣기</button>
          <button id="check" class="btn green hidden">정답 확인</button>
          <button id="next" class="btn ghost">다음 단어 →</button>
        </div>
      </div>
    </section>

    <aside class="card side">
      <h3>훈련 설정</h3>
      <label>단어 범위</label>
      <select id="range">
        <option value="1-50">1–50</option><option value="51-100">51–100</option>
        <option value="101-150">101–150</option><option value="151-200">151–200</option>
        <option value="201-250">Challenge 201–250</option><option value="251-300">Challenge 251–300</option>
        <option value="1-300" selected>전체 1–300</option>
      </select>
      <label>문제 수</label>
      <select id="countSel"><option selected>50</option><option>100</option><option>200</option><option>300</option></select>
      <label>목소리</label><select id="voice"><option>불러오는 중...</option></select>
      <label>속도</label>
      <select id="rate"><option value=".72">느리게</option><option value=".9" selected>보통</option><option value="1.08">빠르게</option></select>
      <div class="check"><input id="randomVoice" type="checkbox" checked><span>문제마다 다른 목소리</span></div>
      <div class="check"><input id="shuffle" type="checkbox" checked><span>단어 순서 섞기</span></div><div class="check"><input id="autoPlay" type="checkbox" checked><span>듣기 모드 자동으로 다음 단어</span></div>
      <button id="restart" class="btn red" style="width:100%;margin-top:16px">↻ 새 훈련 시작</button>
      <div class="stats">
        <div class="stat"><b id="score">0</b><span>정답</span></div>
        <div class="stat"><b id="acc">0%</b><span>정확도</span></div>
      </div>
    </aside>
  </div>
</div>

function loadVoices(){voices=speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang));E.voice.innerHTML=voices.length?voices.map((v,i)=>`<option value="${i}">${v.name} · ${v.lang}</option>`).join(''):'<option>기본 영어 음성</option>'}

function say(text,rate=Number(E.rate.value),onend=null){

}
function spellText(w){return w.toUpperCase().split('').join(', ')}

function setPlayLabel(){
  E.playPause.textContent=isPaused?'▶️ 계속':(isPlaying?'⏸ 일시정지':'▶️ 재생');
}
function stopPlayback(){
  playToken++;
  speechSynthesis.cancel();
  clearInterval(timer);
  isPlaying=false;isPaused=false;
  setPlayLabel();
}
function pausePlayback(){
  if(!isPlaying)return;
  if(speechSynthesis.speaking&&!speechSynthesis.paused){speechSynthesis.pause();isPaused=true}

  setPlayLabel();
}
function goPrev(){
  stopPlayback();
  idx=idx>0?idx-1:queue.length-1;
  render();
}
function goNextManual(){
  stopPlayback();
  idx=idx<queue.length-1?idx+1:0;
  render();
}

     clearInterval(timer);
     if(token!==playToken)return;
     E.count.classList.add('hidden');E.word.textContent=w.word;
     E.spelling.textContent=w.word.toUpperCase().split('').join(' · ');
     E.spelling.classList.remove('hidden');
     say(`The answer is ${w.word}. ${spellText(w.word)}`,.72,()=>{
       if(token!==playToken)return;
       isPlaying=false;setPlayLabel();
       if(repeatCurrent){setTimeout(()=>render(),900)}
       else if(E.autoPlay.checked)setTimeout(()=>next(),900);
     })
   }},1000);
 }
 }else{
   E.prompt.textContent='단어를 듣고 정답을 타이핑하세요.';
   E.word.textContent='🐝';E.hint.textContent='입력 후 Enter 또는 정답 확인 버튼을 누르세요.';
   E.answer.classList.remove('hidden');E.check.classList.remove('hidden');E.next.classList.add('hidden');
   setTimeout(()=>{speakWord();E.answer.focus()},250);
 }
}
function check(){
 if(locked)return;locked=true;attempts++;const ok=E.answer.value.trim().toLowerCase()===current().word;
 if(ok){correct++;E.result.textContent='✅ Correct!';say('Correct!',1.05)}else{E.result.textContent=`❌ ${current().word.toUpperCase()}`;say(`The answer is ${current().word}. ${spellText(current().word)}`,.72)}
 stats();setTimeout(next,1400);
}
function next(){if(idx<queue.length-1){idx++;render()}else finish()}
function finish(){stopPlayback();E.bar.style.width='100%';E.prompt.textContent='훈련 완료!';E.word.textContent=`${correct} / ${queue.length}`;E.spelling.classList.add('hidden');E.answer.classList.add('hidden');E.check.classList.add('hidden');E.next.classList.add('hidden');E.count.classList.add('hidden');E.hint.textContent='새 훈련 시작을 눌러 다시 연습하세요.'}
function stats(){E.score.textContent=correct;E.acc.textContent=attempts?Math.round(correct/attempts*100)+'%':'0%'}
tabs.forEach(t=>t.onclick=()=>{stopPlayback();tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.mode;build()});
E.listen.onclick=()=>{stopPlayback();speakWord()};
E.spellBtn.onclick=()=>{stopPlayback();speakSpelling()};
E.check.onclick=check;E.next.onclick=next;E.restart.onclick=build;
E.prev.onclick=goPrev;E.nextPlayer.onclick=goNextManual;
E.playPause.onclick=()=>{
  if(isPlaying){pausePlayback()}
  else{stopPlayback();render()}
};
E.repeatOne.onclick=()=>{
  repeatCurrent=!repeatCurrent;
  E.repeatOne.textContent=repeatCurrent?'🔁 반복 ON':'🔁 반복';
  E.repeatOne.classList.toggle('blue',repeatCurrent);
};
E.answer.addEventListener('keydown',e=>{if(e.key==='Enter')check()});build();
</script>
</body></html>
